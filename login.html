<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - 0xFF Tools</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.box{
width:420px;
background:rgba(10,10,10,.85);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 0 25px rgba(255,255,255,.12);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#111;
color:white;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:white;
color:black;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

p{
margin-top:20px;
text-align:center;
cursor:pointer;
color:#aaa;
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="box">

<h1>0xFF</h1>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Mot de passe">

<button onclick="login()">Connexion</button>

<button onclick="register()">Créer un compte</button>

<p onclick="window.location='index.html'">Continuer sans compte</p>

</div>

<script>
window.onload = function () {

    const SUPABASE_URL = "https://xbejkvepazscdtkziykr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_kGA28nBDs0xHXfv4MEUL3Q_cms9RpiM";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.register = async function () {

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
            alert("Remplis tous les champs.");
            return;
        }

        const { error } = await supabase.auth.signUp({
            email: email,
            password: password
        });

        if (error) {
            alert(error.message);
            console.error(error);
        } else {
            alert("Compte créé avec succès !");
        }
    };

    window.login = async function () {

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
            alert("Remplis tous les champs.");
            return;
        }

        const { error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            alert(error.message);
            console.error(error);
        } else {
            window.location.href = "index.html";
        }
    };

    // Fond étoilé
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    resize();
    window.addEventListener("resize", resize);

    const stars = [];

    for (let i = 0; i < 250; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2
        });
    }

    function draw() {

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";

        stars.forEach(star => {

            ctx.beginPath();
            ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
            ctx.fill();

            star.y += 0.2;

            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }

        });

        requestAnimationFrame(draw);
    }

    draw();
};
</script>

</body>
</html>
